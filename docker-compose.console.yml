version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: ./console/.env
    depends_on:
      - redis
    volumes:
      - ./console/logs:/app/console/logs
      - ./console/thumbnails:/app/console/thumbnails
      - ./config:/app/config

  celery:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: >
      celery -A console.backend.celery_app worker
      -Q scrape_q,script_q,render_q,upload_q
      --concurrency=4 --loglevel=info
      --logfile=/app/console/logs/celery.log
    env_file: ./console/.env
    depends_on:
      - redis
    volumes:
      - ./console/logs:/app/console/logs
      - ./config:/app/config

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: >
      celery -A console.backend.celery_app beat
      --loglevel=info
      --logfile=/app/console/logs/celery_beat.log
    env_file: ./console/.env
    depends_on:
      - redis
    volumes:
      - ./console/logs:/app/console/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
