name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:

  # ── Build all three images in parallel ──────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ai-media-automation/api:latest

  build-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.render
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ai-media-automation/render:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ai-media-automation/frontend:latest

  # ── Deploy on Windows self-hosted runner ────────────────────────────────
  deploy:
    needs: [build-api, build-render, build-frontend]
    runs-on: [self-hosted, windows, render]

    steps:
      - name: Set PowerShell execution policy
        shell: cmd
        run: powershell -Command "Set-ExecutionPolicy RemoteSigned -Scope LocalMachine -Force"

      - uses: actions/checkout@v4

      # Write console/.env from secrets
      - name: Write console/.env
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "console" | Out-Null
          $lines = @(
            "DATABASE_URL=postgresql://admin:${{ secrets.DB_PASSWORD }}@postgres:5432/ai_media",
            "REDIS_URL=redis://redis:6379/0",
            "JWT_SECRET=${{ secrets.JWT_SECRET }}",
            "JWT_ALGORITHM=HS256",
            "JWT_EXPIRE_MINUTES=1440",
            "FERNET_KEY=${{ secrets.FERNET_KEY }}",
            "CORE_PIPELINE_PATH=/app",
            "CONSOLE_PORT=8080",
            "FRONTEND_ORIGIN=http://localhost:3000",
            "ENV=production",
            "RUNWAY_API_KEY=${{ secrets.RUNWAY_API_KEY }}"
          )
          [System.IO.File]::WriteAllLines("$PWD\console\.env", $lines, (New-Object System.Text.UTF8Encoding $false))

      # Write config/api_keys.json from secrets
      - name: Write config/api_keys.json
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "config" | Out-Null
          $json = [ordered]@{
            gemini = [ordered]@{
              script = @{ api_key = "${{ secrets.GEMINI_SCRIPT_API_KEY }}"; model = "gemini-2.5-flash" }
              media  = @{ api_key = "${{ secrets.GEMINI_MEDIA_API_KEY }}";  model = "veo-3.1-lite-generate-preview" }
              music  = @{ api_key = "${{ secrets.GEMINI_MEDIA_API_KEY }}";  model = "lyria-3-clip-preview" }
            }
            elevenlabs = [ordered]@{
              api_key     = "${{ secrets.ELEVENLABS_API_KEY }}"
              voice_id_en = "${{ secrets.ELEVENLABS_VOICE_ID_EN }}"
              voice_id_vi = "${{ secrets.ELEVENLABS_VOICE_ID_VI }}"
              model       = "eleven_flash_v2_5"
            }
            suno    = @{ api_key = "${{ secrets.SUNO_API_KEY }}"; model = "V4_5" }
            sunoapi = @{ api_key = "${{ secrets.SUNO_API_KEY }}" }
            pexels  = @{ api_key = "${{ secrets.PEXELS_API_KEY }}" }
          }
          $text = $json | ConvertTo-Json -Depth 5
          [System.IO.File]::WriteAllText("$PWD\config\api_keys.json", $text, (New-Object System.Text.UTF8Encoding $false))

      # Write pipeline.env from variables (non-sensitive) + secrets
      - name: Write pipeline.env
        shell: powershell
        run: |
          $lines = @(
            "OUTPUT_PATH=${{ vars.OUTPUT_PATH }}",
            "ASSET_DB_PATH=${{ vars.ASSET_DB_PATH }}",
            "MODELS_PATH=${{ vars.MODELS_PATH }}",
            "MUSIC_PATH=${{ vars.MUSIC_PATH }}",
            "TTS_ENGINE=auto",
            "TIKTOK_SCRAPER_ENGINE=auto",
            "TIKTOK_BROWSER_HEADLESS=true",
            "TIKTOK_BROWSER_HEADFUL_RETRY_ON_EMPTY=true",
            "TIKTOK_SELENIUM_FALLBACK=true"
          )
          [System.IO.File]::WriteAllLines("$PWD\pipeline.env", $lines, (New-Object System.Text.UTF8Encoding $false))

      # Write DB_PASSWORD for docker-compose postgres service
      - name: Write .env for compose
        shell: powershell
        run: |
          [System.IO.File]::WriteAllText("$PWD\.env", "DB_PASSWORD=${{ secrets.DB_PASSWORD }}`n", (New-Object System.Text.UTF8Encoding $false))

      # Pull latest images from GHCR
      - name: Pull images
        shell: powershell
        run: docker compose pull

      # Start postgres and redis first so the migration container can connect
      - name: Start postgres and redis
        shell: powershell
        run: docker compose up -d postgres redis

      # Wait until postgres is healthy before running migrations
      - name: Wait for postgres
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $retries = 15
          while ($retries -gt 0) {
            docker compose exec -T postgres pg_isready -U admin 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds 2
            $retries--
          }
          if ($retries -eq 0) { throw "Postgres did not become ready in time" }

      # Run database migrations (one-off container)
      - name: Run migrations
        shell: powershell
        run: |
          docker run --rm `
            --env-file console\.env `
            --network ai-media-automation_default `
            ghcr.io/khiemle/ai-media-automation/api:latest `
            sh -c "cd /app/console/backend && alembic upgrade head"

      # Restart all services
      - name: Start services
        shell: powershell
        run: docker compose up -d --remove-orphans
