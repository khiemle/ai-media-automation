name: Frontend Tests

on:
  pull_request:
    paths:
      - 'console/frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'console/frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: console/frontend/package-lock.json

      - name: Install dependencies
        # npm install (not npm ci) because the lockfile is generated on macOS
        # and CI's Linux runner needs platform-specific optional deps that
        # npm ci would reject as "missing from lock file".
        run: |
          npm install --no-audit --no-fund
          npm install --no-audit --no-fund --save-dev @vitest/coverage-v8

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          npx vitest run \
            --coverage --coverage.reporter=cobertura --coverage.reporter=html \
            --reporter=junit --outputFile=junit.xml

      - name: Generate test report
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          REPORT_NAME: Frontend Tests
          JUNIT_PATH: console/frontend/junit.xml
          COVERAGE_PATH: console/frontend/coverage/cobertura-coverage.xml
        run: python3 .github/scripts/report.py

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            console/frontend/junit.xml
            console/frontend/coverage/
          if-no-files-found: warn
          retention-days: 14
