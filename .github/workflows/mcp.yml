name: MCP Tests

on:
  pull_request:
    paths:
      - 'console/mcp/**'
      - 'requirements.mcp.txt'
      - '.github/workflows/mcp.yml'
  push:
    branches: [main]
    paths:
      - 'console/mcp/**'
      - 'requirements.mcp.txt'
      - '.github/workflows/mcp.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MCP_API_TOKEN: test-token
      MCP_CONSOLE_API_BASE: http://test
      MCP_LOG_LEVEL: debug
      MCP_IDEMPOTENCY_TTL_S: '3600'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            console/requirements.txt
            requirements.pipeline.txt
            requirements.mcp.txt

      - name: Install dependencies
        # MCP tests transitively import from console.backend (fastapi) and
        # mock redis via fakeredis, so the slim requirements.mcp.txt isn't
        # enough — install the full console + pipeline stack plus test extras.
        run: |
          python -m pip install --upgrade pip
          pip install -r console/requirements.txt
          pip install pytest pytest-asyncio pytest-cov respx fakeredis

      - name: Run MCP tests
        run: |
          pytest console/mcp/tests/ \
            --cov=console/mcp \
            --cov-report=xml:coverage.xml --cov-report=html:htmlcov --cov-report=term \
            --junitxml=junit.xml -v

      - name: Generate test report
        if: always()
        env:
          REPORT_NAME: MCP Tests
        run: python3 .github/scripts/report.py

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-test-results
          path: |
            junit.xml
            coverage.xml
            htmlcov/
          if-no-files-found: warn
          retention-days: 14
