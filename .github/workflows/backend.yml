name: Backend Tests

on:
  pull_request:
    paths:
      - 'console/backend/**'
      - 'console/requirements.txt'
      - 'requirements.pipeline.txt'
      - 'tests/**'
      - 'database/**'
      - 'rag/**'
      - 'uploader/**'
      - 'feedback/**'
      - 'pytest.ini'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'console/backend/**'
      - 'console/requirements.txt'
      - 'requirements.pipeline.txt'
      - 'tests/**'
      - 'database/**'
      - 'rag/**'
      - 'uploader/**'
      - 'feedback/**'
      - 'pytest.ini'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: ai_media_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://admin:testpw@localhost:5432/ai_media_test
      DATABASE_URL: postgresql://admin:testpw@localhost:5432/ai_media_test
      REDIS_URL: redis://localhost:6379/0
      GEMINI_API_KEY: test
      GEMINI_MEDIA_API_KEY: test
      PEXELS_API_KEY: test
      ELEVENLABS_API_KEY: test
      RUNWAY_API_KEY: test
      YOUTUBE_API_KEY: test
      FERNET_KEY: 'xSDP9q3SS0jLfBLDhDDJZfaKH5WSoGUlJksXIdoaC_A='
      JWT_SECRET: test-jwt-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            console/requirements.txt
            requirements.pipeline.txt

      - name: System deps for Python wheels
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 libgomp1 ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r console/requirements.txt
          pip install pytest-cov

      - name: Run alembic migrations
        working-directory: console/backend
        run: alembic upgrade head

      - name: Run backend tests
        run: |
          pytest -m "not render and not slow and not manual" \
            tests/ console/backend/tests/ \
            --cov=console/backend --cov=database --cov=rag --cov=uploader --cov=feedback \
            --cov-report=xml:coverage.xml --cov-report=html:htmlcov --cov-report=term \
            --junitxml=junit.xml -v

      - name: Generate test report
        if: always()
        env:
          REPORT_NAME: Backend Tests
        run: python3 .github/scripts/report.py

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            junit.xml
            coverage.xml
            htmlcov/
          if-no-files-found: warn
          retention-days: 14
